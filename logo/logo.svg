<svg viewBox="0 0 300 80" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PetPlanWise.com">
  <!-- "PetPlanWise" left-anchored so we control where it ends -->
  <text x="20" y="36"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="28" font-weight="700"
    fill="#0F172A" letter-spacing="-0.5">PetPlanWise</text>

  <!-- Dot -->
  <circle cx="207" cy="30" r="3" fill="#0F766E" />

  <!-- ".com" — fits inside a now-wider viewBox -->
  <text x="214" y="36"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="22" font-weight="500"
    fill="#0F172A">com</text>

  <!-- Centered paw print under the wordmark -->
  <g transform="translate(150, 60)">
    <ellipse cx="0" cy="6" rx="7" ry="8.5" fill="#0F766E" />
    <ellipse cx="-9" cy="-2" rx="4" ry="6" fill="#0F766E" transform="rotate(-20 -9 -2)" />
    <ellipse cx="0"  cy="-5" rx="4" ry="6" fill="#0F766E" />
    <ellipse cx="9"  cy="-2" rx="4" ry="6" fill="#0F766E" transform="rotate(20 9 -2)" />
  </g>
</svg>
